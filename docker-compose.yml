version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ML_SERVICE_BASE_URL=http://ml-service:8000
      - RAG_SERVICE_BASE_URL=http://rag-service:8001
    depends_on:
      - ml-service
      - rag-service

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
   